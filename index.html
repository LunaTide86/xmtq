<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小满天气大测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .search-box {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .search-input-wrapper {
            display: flex;
            gap: 10px;
        }

        .search-input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .search-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .quick-cities {
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .quick-city {
            padding: 6px 14px;
            background: #f0f0f0;
            border: none;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-city:hover {
            background: #667eea;
            color: white;
        }

        .weather-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .current-weather {
            text-align: center;
        }

        .city-name {
            font-size: 2rem;
            color: #333;
            margin-bottom: 5px;
        }

        .update-time {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .weather-main {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .weather-icon {
            font-size: 5rem;
        }

        .temperature {
            font-size: 4rem;
            font-weight: 300;
            color: #333;
        }

        .weather-desc {
            font-size: 1.3rem;
            color: #666;
            margin-bottom: 20px;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .detail-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .detail-label {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 1.2rem;
            color: #333;
            font-weight: 500;
        }

        .forecast-section {
            margin-top: 25px;
        }

        .section-title {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .forecast-day {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: transform 0.2s;
        }

        .forecast-day:hover {
            transform: translateY(-5px);
        }

        .forecast-date {
            font-size: 1rem;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .forecast-icon {
            font-size: 2.5rem;
            margin: 10px 0;
        }

        .forecast-temp {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 5px;
        }

        .forecast-desc {
            font-size: 0.9rem;
            color: #666;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f0f0f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 15px 20px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8rem;
            }
            
            .temperature {
                font-size: 3rem;
            }
            
            .weather-icon {
                font-size: 3.5rem;
            }
            
            .search-input-wrapper {
                flex-direction: column;
            }
            
            .search-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌤️ 小满天气大测试</h1>
            <p>查询全国各地天气，未来三天预报</p>
        </div>

        <div class="search-box">
            <div class="search-input-wrapper">
                <input type="text" class="search-input" id="cityInput" placeholder="输入城市名称，如：北京、上海、广州..." onkeypress="if(event.key==='Enter')searchWeather()">
                <button class="search-btn" id="searchBtn" onclick="searchWeather()">查询</button>
            </div>
            <div class="quick-cities">
                <button class="quick-city" onclick="searchCity('北京')">北京</button>
                <button class="quick-city" onclick="searchCity('上海')">上海</button>
                <button class="quick-city" onclick="searchCity('广州')">广州</button>
                <button class="quick-city" onclick="searchCity('深圳')">深圳</button>
                <button class="quick-city" onclick="searchCity('杭州')">杭州</button>
                <button class="quick-city" onclick="searchCity('成都')">成都</button>
                <button class="quick-city" onclick="searchCity('武汉')">武汉</button>
                <button class="quick-city" onclick="searchCity('西安')">西安</button>
            </div>
        </div>

        <div id="loading" class="loading hidden">
            <div class="loading-spinner"></div>
            <p>正在查询天气...</p>
        </div>

        <div id="error" class="error-message hidden"></div>

        <div id="weatherResult"></div>
    </div>

    <script>
        // 天气代码映射
        const weatherCodes = {
            0: { desc: '晴朗', icon: '☀️' },
            1: { desc: ' mainly clear', icon: '🌤️' },
            2: { desc: '多云', icon: '⛅' },
            3: { desc: '阴天', icon: '☁️' },
            45: { desc: '雾', icon: '🌫️' },
            48: { desc: '雾凇', icon: '🌫️' },
            51: { desc: '毛毛雨', icon: '🌦️' },
            53: { desc: '中雨', icon: '🌧️' },
            55: { desc: '大雨', icon: '🌧️' },
            61: { desc: '小雨', icon: '🌧️' },
            63: { desc: '中雨', icon: '🌧️' },
            65: { desc: '大雨', icon: '🌧️' },
            71: { desc: '小雪', icon: '🌨️' },
            73: { desc: '中雪', icon: '🌨️' },
            75: { desc: '大雪', icon: '❄️' },
            77: { desc: '雪粒', icon: '🌨️' },
            80: { desc: '阵雨', icon: '🌦️' },
            81: { desc: '强阵雨', icon: '🌧️' },
            82: { desc: '暴雨', icon: '⛈️' },
            85: { desc: '阵雪', icon: '🌨️' },
            86: { desc: '强阵雪', icon: '❄️' },
            95: { desc: '雷雨', icon: '⛈️' },
            96: { desc: '雷雨伴冰雹', icon: '⛈️' },
            99: { desc: '强雷雨伴冰雹', icon: '⛈️' }
        };

        function getWeatherInfo(code) {
            return weatherCodes[code] || { desc: '未知', icon: '❓' };
        }

        function searchCity(city) {
            document.getElementById('cityInput').value = city;
            searchWeather();
        }

        async function searchWeather() {
            const city = document.getElementById('cityInput').value.trim();
            if (!city) {
                showError('请输入城市名称');
                return;
            }

            showLoading(true);
            hideError();

            try {
                // 1. 获取城市坐标
                const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=zh&format=json`;
                const geoRes = await fetch(geoUrl);
                const geoData = await geoRes.json();

                if (!geoData.results || geoData.results.length === 0) {
                    throw new Error('未找到该城市，请检查拼写');
                }

                const location = geoData.results[0];
                const lat = location.latitude;
                const lon = location.longitude;
                const cityName = location.name;
                const country = location.country || '';

                // 2. 获取天气数据
                const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=auto&forecast_days=4`;
                const weatherRes = await fetch(weatherUrl);
                const weatherData = await weatherRes.json();

                displayWeather(cityName, country, weatherData);
            } catch (err) {
                showError(err.message || '查询失败，请稍后重试');
            } finally {
                showLoading(false);
            }
        }

        function displayWeather(cityName, country, data) {
            const current = data.current_weather;
            const daily = data.daily;
            const currentInfo = getWeatherInfo(current.weathercode);
            
            const now = new Date();
            const timeStr = now.toLocaleString('zh-CN', { 
                month: 'long', 
                day: 'numeric', 
                hour: '2-digit', 
                minute: '2-digit' 
            });

            let forecastHTML = '';
            for (let i = 1; i < 4; i++) {
                const date = new Date(daily.time[i]);
                const dateStr = date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
                const weekStr = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'][date.getDay()];
                const info = getWeatherInfo(daily.weathercode[i]);
                const maxTemp = Math.round(daily.temperature_2m_max[i]);
                const minTemp = Math.round(daily.temperature_2m_min[i]);
                
                forecastHTML += `
                    <div class="forecast-day">
                        <div class="forecast-date">${weekStr} ${dateStr}</div>
                        <div class="forecast-icon">${info.icon}</div>
                        <div class="forecast-temp">${maxTemp}° / ${minTemp}°</div>
                        <div class="forecast-desc">${info.desc}</div>
                    </div>
                `;
            }

            const html = `
                <div class="weather-card">
                    <div class="current-weather">
                        <h2 class="city-name">${cityName} ${country ? '(' + country + ')' : ''}</h2>
                        <p class="update-time">更新时间：${timeStr}</p>
                        
                        <div class="weather-main">
                            <span class="weather-icon">${currentInfo.icon}</span>
                            <span class="temperature">${Math.round(current.temperature)}°C</span>
                        </div>
                        
                        <p class="weather-desc">${currentInfo.desc}</p>
                        
                        <div class="weather-details">
                            <div class="detail-item">
                                <div class="detail-label">风速</div>
                                <div class="detail-value">${current.windspeed} km/h</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">风向</div>
                                <div class="detail-value">${getWindDirection(current.winddirection)}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">最高温</div>
                                <div class="detail-value">${Math.round(daily.temperature_2m_max[0])}°C</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">最低温</div>
                                <div class="detail-value">${Math.round(daily.temperature_2m_min[0])}°C</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="forecast-section">
                        <h3 class="section-title">📅 未来三天预报</h3>
                        <div class="forecast-grid">
                            ${forecastHTML}
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('weatherResult').innerHTML = html;
        }

        function getWindDirection(degree) {
            const directions = ['北', '东北', '东', '东南', '南', '西南', '西', '西北'];
            const index = Math.round(degree / 45) % 8;
            return directions[index] + '风';
        }

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('hidden', !show);
            document.getElementById('searchBtn').disabled = show;
        }

        function showError(msg) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = msg;
            errorEl.classList.remove('hidden');
        }

        function hideError() {
            document.getElementById('error').classList.add('hidden');
        }

        // 页面加载时自动查询北京天气
        window.onload = () => {
            searchCity('北京');
        };
    </script>
</body>
</html>
